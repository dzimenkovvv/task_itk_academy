version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: QWErt123
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:QWErt123@postgres:5432/postgres?sslmode=disable",
      "up"
    ]

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "9091:9091"
    env_file:
      - config.env
    environment:
      DB_HOST: postgres

volumes:
  pgdata: